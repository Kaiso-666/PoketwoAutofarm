name: Build Windows Binary

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install Dependencies via vcpkg
      shell: pwsh
      run: |
        # Use the explicit VCPKG_ROOT path provided by the runner image
        & "$env:VCPKG_ROOT\vcpkg.exe" install "opencv4[core]:x64-windows-static" "tesseract:x64-windows-static"

    - name: Compile Ocr Worker (Static)
      shell: pwsh
      run: |
        $LibFolder = "$env:VCPKG_ROOT\installed\x64-windows-static\lib"
        $IncludeFolder = "$env:VCPKG_ROOT\installed\x64-windows-static\include"
        
        # Dynamically gather all static libraries to satisfy dependencies cleanly
        $StaticLibs = Get-ChildItem -Path $LibFolder -Filter *.lib | Select-Object -ExpandProperty Name
        
        # Compile using MSVC optimizing compiler with static linkage
        & cl.exe /EHsc /O2 /MT /I"$IncludeFolder" ocr_worker.cpp /link /LIBPATH:"$LibFolder" $StaticLibs /OUT:ocr_worker.exe

    - name: Upload Compiled Binary
      uses: actions/upload-artifact@v4
      with:
        name: ocr_worker_windows
        path: ocr_worker.exe
