name: Build Windows Binary

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install Dependencies via vcpkg
      shell: pwsh
      run: |
        # Use quotes and call operator to prevent PowerShell parser token errors
        & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install "opencv4[core]:x64-windows-static" "tesseract:x64-windows-static"

    - name: Compile Ocr Worker (Static)
      shell: pwsh
      run: |
        $LibFolder = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static\lib"
        $IncludeFolder = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static\include"
        
        # Dynamically fetch every generated static library file name to prevent linker reference drops
        $StaticLibs = Get-ChildItem -Path $LibFolder -Filter *.lib | Select-Object -ExpandProperty Name
        
        # Compile with static runtime configuration (/MT)
        # Added /I"$IncludeFolder\opencv4" to resolve opencv2/opencv.hpp header location
        # Appended critical Windows system .libs at the end to satisfy static link dependencies
        & cl.exe /EHsc /O2 /MT /I"$IncludeFolder" /I"$IncludeFolder\opencv4" ocr_worker.cpp /link /LIBPATH:"$LibFolder" $StaticLibs Windowscodecs.lib Ole32.lib Gdi32.lib Comctl32.lib User32.lib Advapi32.lib Ws2_32.lib /OUT:ocr_worker.exe

    - name: Upload Compiled Binary
      uses: actions/upload-artifact@v4
      with:
        name: ocr_worker_windows
        path: ocr_worker.exe
